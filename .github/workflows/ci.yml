name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cl_blog_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install Roswell
        env:
          LISP: sbcl-bin/2.5.10
        run: |
          curl -L https://raw.githubusercontent.com/roswell/roswell/master/scripts/install-for-ci.sh | sh
          echo "$HOME/.roswell/bin" >> $GITHUB_PATH

      - name: Cache Roswell and Quicklisp
        uses: actions/cache@v4
        with:
          path: |
            ~/.roswell
            ~/.cache/common-lisp
            .qlot
          key: ${{ runner.os }}-ros-${{ hashFiles('qlfile.lock', 'cl-blog.asd') }}
          restore-keys: |
            ${{ runner.os }}-ros-

      - name: Install qlot
        run: ros install qlot

      - name: Install dependencies via qlot
        run: |
          qlot install

      - name: Apply database schema
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d cl_blog_test -f db/schema.sql

      - name: Run All Tests
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: cl_blog_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        run: |
          qlot exec ros run \
            -e '(push (truename ".") asdf:*central-registry*)' \
            -e '(ql:quickload :cl-blog/tests)' \
            -e '(setf rove:*default-reporter* :spec)' \
            -e '(unless (rove:run :cl-blog/tests) (uiop:quit 1))' \
            -q
